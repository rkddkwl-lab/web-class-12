<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>값의 형태로 정의하는 함수</title>
</head>
<body>
    <script>
        function a(){
            alert("aaa")
        }
        let b = function(){
            alert("bbb")
        }
        b()
        let c = ()=>{
            alert("ccc")
        }
        c()
        
        function d(n1){
            alert(n1)
        }
        d("ddd")

        let e = function(n1){
            alert(n1)
        }
        e("eee")

        let f = ()=>{
            alert(n1)
        }
        f('fff')

        let g = (a,b)=>[a,b]
        alert(g(1,3))
    </script>
    <h1>콜백함수</h1>
    <script>
        function aa(bb){
            bb()
        }
        aa(function(){
            alert("TT")
        })
        let cc = dd=>{
            dd()
        }
        cc(()=>{
            alert("dd")
        })
    </script>
</body>
</html>
