<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객체의 메서드 표현</title>
</head>
<body>
    <script>
        let ac = {
            bodycolor:"흰색",
            width:60,
            height:200,
            weight:70,
            brand:"carrier",
            powerOn:function(){
                alert("전원이 켜졌습니다.")
            },
            poweroff:function(){
                alert("전원이 꺼졌습니다.")
            },
            temperature:25,
            temperatureup:function(){
                alert("온도를 1도 올립니다.")
                this.temperature+=1
            },
            temperaturedown:function(){
                alert("온도를 1도 내립니다.")
                this.temperature-=1
            }
        }
        ac["bodycolor"]
        ac.bodycolor
        ac.weight
        ac.powerOn()
        ac.poweroff()
        alert(ac.temperature)
        ac.temperatureup()
        alert(ac.temperature)
        ac.temperaturedown()
        ac.temperaturedown()
        ac.temperaturedown()
        alert(ac.temperature)
    </script>
</body>
</html>
