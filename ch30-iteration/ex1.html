<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12기 명단</title>
    <link rel="stylesheet" href="./css/ex1.css">
    <script src="./js/classmate.js"></script>
</head>
<body>
    <div class="wrap">
        <h1>12기 멋쟁이 토마토들</h1>
        <p>12기 학생들을 소개합니다.</p>
        <ul class="grid-box">
            <script>
                for(let i=0 ; i<class12th.length ; i++){
                    document.write(`<li>
                    <figure>
                        <img src="./img/${class12th[i][9]}" alt="${class12th[i][1]} 사진">
                    </figure>
                    <h2>${class12th[i][1]}</h2>
                    <dl>
                        <dt>성별</dt>
                        <dd>${class12th[i][2]}</dd>
                        <dt>나이</dt>
                        <dd>${class12th[i][3]}</dd>
                        <dt>띠</dt>
                        <dd>${class12th[i][4]}</dd>
                        <dt>mbti</dt>
                        <dd>${class12th[i][5]}</dd>
                        <dt>결혼여부</dt>
                        <dd>${class12th[i][6]}</dd>
                        <dt>취미</dt>
                        <dd>${class12th[i][7]}</dd>
                        <dt>좌우명</dt>
                        <dd>${class12th[i][8]}</dd>
                    </dl>
                </li>`)
            }
            </script>
        </ul>
    </div>
</body>
</html>
