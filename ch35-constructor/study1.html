<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생성자 함수</title>
</head>
<body>
    <h1>생성자 함수</h1>
    <p>생성자 함수란? 객체를 생성하는 함수를 뜻한다.</p>
    <script>
        function Person(uname,uage){
            this.name = uname
            this.age = uage
            this.sayHello = function(){
                alert(`안녕하세요 저는 ${this.name}입니다.`)
            }
        }
        let person1 = new Person("강건희",27)
        let person2 = new Person("이은지",20)
        person1.sayHello()
        person2.sayHello()
        // let person1 = {
        //     name:"강건희",
        //     age:27,
        //     sayHello:function(){alert(`안녕하세요 저는 강건희입니다.`)}}
    </script>
    <!-- 생성자 함수 앞에는 대문자로 해야함 "P"erson--> 
</body>
</html>
